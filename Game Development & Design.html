<!DOCTYPE html>
<html lang="en">
<head>

    <title>Techhub</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
    <link rel="manifest" href="assets/site.webmanifest">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
      button:hover,
      .grid-item:hover {
        transform: scale(1.05);
        transition: 0.3s ease;
        filter: brightness(1.2);
      }

      a:hover {
        color: #FFFFFF !important;
      }

      .icon{
        font-size: 38px;
        color: white;
        cursor: pointer;
        transition: 0.25s;
        display: flex;
        width: 100%;
        height: 100%;
        justify-content: center;
        align-items: center;
      }

      .icon:hover {
        color: #FF7B00;
        transform: translateY(-15px) scale(1.7);
      }

      /* The background overlay */
.modal-overlay {
    display: none; /* Hidden by default */
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(4px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

/* The actual window */
.modal-content {
    background: #1a1a1a;
    border: 1px solid #FF7B00; /* Matching your orange theme */
    padding: 20px;
    border-radius: 12px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    color: white;
}

/* Top dots for a "window" look */
.modal-header { text-align: left; margin-bottom: 15px; }
.dot { height: 8px; width: 8px; background: #333; border-radius: 50%; display: inline-block; margin-right: 4px; }

/* The Button */
.modal-btn {
    margin-top: 20px;
    background: #FF7B00;
    border: none;
    padding: 8px 30px;
    border-radius: 20px;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.modal-btn:hover { background: #FF7B00; transform: scale(1.05); }
    </style>
</head>
<body style="background-color:#050505; margin: 0; display: flex; flex-direction:column; align-items: center; min-height:100vh; font-family: 'Arial', sans-serif; padding: 20px;">

</div>

    <div id="customAlert" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
        <p id="modalMessage">Service not available at the moment.</p>
        <button onclick="closeModal()" class="modal-btn">OK</button>
    </div>
</div> 

<script>
        function showAlert() {
            document.getElementById('customAlert').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('customAlert').style.display = 'none';
        }

</html>
